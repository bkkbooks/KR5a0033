body:
  text: 太隂化生水位之精虚危上應龜蛇合形周行六合威攝萬靈無幽不察無願不成劫終劫始剪伐魔精救護羣品家國咸寧數中末甲妖氣流行上帝有勑吾故降靈闡揚正法蕩邪辟兵化育黎兆恊賛中興敢有小鬼欲來現形吾目一視五嶽摧傾急急如律令奉禮呪曰太初太易無象無形莫知重濁孰辯輕清吾於混沌分其昏明天得以徤地得以寧民得以養物得以萌邪得以正神得以靈三才之内萬類咸亨大朴旣散仁義乃興禮樂旣作姦邪斯行六誼或失四民有爭上不寛恕下不忠貞或魔或鬼或妖或精恣横荼毒干擾生民全家疾患累歳官刑財物耗散骨肉伶仃性命枉逝災禍相縈穢雜之氣上達天庭天尊有命令與安平有妖皆剪無鬼不烹瘟疫之吏束首伏應鬼精滅爽邪魔摧傾吾有十萬力士五千萬兵天上天下行二千四百里圍二百八十里根深八百四十里得食其實身生金光之色上有金翅之鳥披翼皆周其境下有流火之庭縱廣八十萬里其中則有炎光八鍊自然玄丹諸是上眞萬仙皆以立夏之日悉詣火庭八鍊玄丹之中自鍊更受津源鮮通百神之容也凡後學得仙莫不經洞陽之宫受八鍊而昇天也受鍊過便得食空青之花金翅之鳥皆以羽衣結爲飛仙之服給於受鍊之身以登玉京九鳳之臺也凡上學之士服日月之道以立夏日正中取眞珠八分又丹書八鍊丹胎玉符黃𥿄上投清水中向南沐浴臨甕叩齒二十四通㣲呪如立春之文畢引氣八咽止還室内燒香以錬丹和紫粉囊諸粉以粉身摩兩手令熱拭面及通身首南而卧叩齒九通瞑目握固思日光紫氣累重下冠巳身思巳在日景之内日景迴巳身上昇洞陽之宫在空青之林流火之庭思南極洞陽眞人諱融珠形長八寸衣絳章單衣頭戴日精通陽之冠口吐赤氣勃勃如火之炎以燒巳身須㬰掇取青林之花以與巳食花味甘覺體帀熱咽氣八十過止㣲呪曰日景耀羅綺含玄阿流火洋洋萬津揚波空林鬱青金翅婆娑八錬朱丹芳芝恬和金關四張皇人之家靈暉吐精仰啜飛花左攀玄上右䇿命魔身登高臺逝眄渌那八景翼霄紫瓊丹霞氣同玉眞命齊靈柯長宴九玄路無傾嵯呪畢便服八錬丹胎玉符咽氣八十過咽液三十六過止行此道暮卧又當以立夏日始至立秋以兩手心摩心上左右各八十過思日在心中月在心下日月光暎照帀身叩齒十二通呪曰朝遊青林夕宿朱臺流火萬丈受錬玉脂魂寧魄恱萬神熈頥極日永月三光齊期呪畢便卧行此八年則入火不然面有朱容得與融珠面共語降致丹霞飛昇上清東井之内有廣靈之堂中生三花高環之樹高四千丈枝超行二千里圍二百四十里一劫則生自然三氣之花花似芙蓉之暉也得食一花年同一劫上有金翅之鳥披翼周帀其境下有青芝玉膏之泉名爲東井深九萬丈縱廣九千里暘谷神王所食之泉也諸上仙萬帝皆以立秋之日悉詣廣靈之堂東井之泉沐浴自鍊更受津源通眞之容也凡後學道成莫不詣東井沐浴鍊於玉膏之泉而昇天也受鍊過便得食三氣之花金翅之鳥皆以羽衣結爲飛仙之服給於受鍊之身以登東華青宫也凡上學之士服日月之道當以立秋之日晡時取龍脂三合龍骨亦佳又青書龍景九錬之符白紙上合投清水之中向東沐浴臨甕叩齒二十四通微呪如立春之文畢引氣九咽止還室内燒香以龍骨爲粉粉身兩手摩拭面目通身東首而卧叩齒九通暝目握固思日光紫氣累重下降帀己身己在日景之内日景運兆身上昇廣靈之堂東井之中髙環樹之下思丹靈少陽眞人諱勾上眞形長九寸著青羽飛衣頭戴通精曜光之冠口吐青氣以灌哺兆身瑠璃之器請玉泉青芝之膏以灌兆形食以三氣之華覺其味甘香體覺帀熱因咽氣九過止而微呪曰玉闕蘭室日華髙騫三華結秀妙景拂晨太素迴眞曲灌玉泉形栖廣靈虹暎朱軒洞陽吐精東井錬魂五帝冠帶變貌金顔怡頥明鮮以成玉仙丹靈少陽使我自然金翅拂飾羽服輝晨翻然凌虚上啜日根體鏡水精龍輿光欣羽駕來迎上造玉皇之前呪畢便服龍景九錬之符咽氣九十過咽液二十四過止凡行此道暮卧又當以立秋日始至立冬以兩手攝兩肩井各三十二過日在左肩井中月在右肩井中二光暎照帀身叩齒十二通呪曰左日右月二景監靈暮息少陽朝登玉清三魂守室七魄固形萬神輔翼與景齊并呪畢便卧行此八年通身光明面生青暉之精與少陽同言降致緑軿飛行玄虚上昇玉清也廣寒之宫中生青花之林髙四千丈枝超行千二百里圍二百四十里其葉似竹而赤其花似鏡而明其子似李而無核所謂絳樹丹實得食其葉壽益萬年得食其花與日同靈得食其實遊宴玉清上有金翅之鳥披翼周帀其境下有廣寒之池生自然九錬洪泉深五萬里縱廣五千里上眞帝皇髙仙眞人皆以立冬之日登廣寒之宫採青花以自拂臨廣寒之池灌洪泉以錬眞也諸後學道成及學士七祖應昇天堂者莫不經廣寒之官入九錬之泉受錬而昇天也受錬過便得食青林之花實也金翅之鳥皆以羽衣結爲飛仙之服給於受錬者身以登玉清上宫也凡上學之士服日月之道當以立冬之日夜半取雲母三合又墨書日魂錬精隂符青紙上合投清水之中向北沐浴臨甕叩齒十二通微呪如立春之文畢引氣九咽止還室内燒香以雲母作粉粉身兩手摩拭面目北首而卧叩齒九通瞑目握固思日光紫氣累重下降帀一身存已在日景之内日景運兆身上昇廣寒之宫青花之林九錬洪泉池中思隂靈玉景眞人諱玄上冥形長五寸三分著玄虚錦衣頭戴通陽玉晨之冠口吐玄氣之雲以灌兆身金槃請九錬洪泉以灌漑兆形授以青花之實食之味甜體覺帀熱因咽氣五十過止微呪曰九曜生暉煥芒玄樞廣霞峩峩寒宫悠悠四老上舘皇上所遊明玉之輪五風迅軀育養寒郷錬剛鮮柔八氣相推四郷交周冠帶巳整日魂吐符絳樹赤實與天同休金翅拂羽章服曜無散煙落暉之造西嵎金門蘭室四氣相扶玄上𢹂契玉景同遊呪畢便服日魂錬精隂符咽氣五十通咽液二十過止行此之道暮卧又當以立冬日始至立春以兩手摩臍下至命門各五十過思日在臍下月在命門中二光沌黃洞暎一身便叩齒九通呪曰朝飲蘭池夕宿金廬日月交帶玄廕紫虚魂安魄寧萬神保居四眞𢹂契降致雲輿上昇金闕列名帝書呪畢便卧行之八年身生竒光項負圎耀暎照八方乘雲飛騰白日昇天也此日受錬於金門冠帶於洞陽沐浴於東井育養於廣寒周流四郷一百八十日周還金門之上天數云經三千六百度則陽氣否隂氣激百六之交萬災蕩世天分攺度也學者當隨其日之運採取陽精則免百六之災矣月縱廣一千九百里月暈圍七千八百四十里白銀瑠璃水精暎内一分六十炎光明照於外其中城郭人民亦有七寳浴月八騫之林生乎其内月中人長一丈六尺悉衣青色之衣月中人常以月一日至十六日採白銀瑠璃錬於炎光之冶故月度盈則光明鮮太素以十七日至二十九日於騫林之下採三氣之華拂日月之光故月度虧其光微玄景運行亦五風梵其綱也故制日月星宿遊行虚無初不休息秋分之日月宿東井之上廣靈之堂沐浴東井之池以錬月魂明八朗之芒當此之日月受陽精於日暉吐黃氣於玉池秋分之日諸天人悉採環樹之花以拂日月之光月以黃氣灌天人之容故秋分是天大㑹之日黃氣陽精交降之時也凡求仙之道毎以秋分之日平旦入室西向眠坐任意閉眼思月中白光夫人姓諱形長六寸六分頭作頺雲之髻著素錦飛裙口衘月光下入兆身治命門之中須㬰月光散爲黃氣帀降一身白光夫人在月圎之内採環樹之花散拂黃氣之中夫人口吐陽精陽精赤以灌兆形從内帀外黃赤二氣更相纒繞洞帀一身夫人授兆紫書丹字六音便引黃氣三十六咽引陽精二十四咽止叩齒二十四通仰祝曰青池靈淵飛泉吐芳精灌丹暉散花靈堂陽降玉芝隂氣混黃二景潜暉三道順行夫人冠帶沐浴炎光以津灌身蘭潤洋洋丹書紫字以鎭六宫内化金仙外降飛龍瓊輿羽蓋玄張軒昻雲騎來迎四會八通七曜紫景飛行太空呪畢又咽氣三十六過咽液二十四過止便服紫書丹字行此道八年夫人現形與兆共言通身生紫青之光空行玄虚神仙昇天右紫書丹字月魂隱音題月東境騫林之樹葉結自然之書也得服此字壽萬年施日月之道乃有數十法至於此音不行也輕泄身現世負風刀之考七祖充無極鬼責三塗五苦萬劫不原當以秋分日平旦東向丹筆書紫紙上服之叩齒十二通微呪曰玄暉明白紫氣艶光鬱飈乘日四六相通外拂朱花内結八芒紫道流煥我身逸充得乘景輿上造帝堂呪畢咽氣二十四過止又丹書生紫上佩頭三年頂生紫光三尺得給玉女六人口受靈音妄告三人死没鬼官百年有金名玉字之人得傳一人祕則神仙飛行上清冬至之日月伏廣寒之宫廣寒之宫則月之上舘以其時育養月魂於廣寒之池當此之日納黃氣於玉胞吐陽精於寒池諸天人悉以其日採青花之林以拂日月之光月以陽精灌天人之容故冬至之日運道履長黃氣陽精納暉之時也求仙之道當以冬至之日正中入室北向眠坐任意閉眼内思月中玄光夫人姓諱形長五寸五分頭作頺雲之髻著玄錦飛裙口衘月光下入兆身心中須㬰月光散爲黃氣洞帀兆身夫人在月圎之内採青華之林散拂黃氣之中口吐陽精陽精赤以灌兆形從内帀外黃赤二氣更相纒繞洞暎一身夫人授兆紫書丹字六音便引黃氣三十二咽引陽精二十四咽止叩齒二十四通仰呪曰玄隂寒池流泉浩庭飛花散景吐黃納精二氣纒緜玉芝虚生天人嗽香夫人翼靈蘭池滂沱流黃鬱冥普天納暉降及我形還童錬容反白結青紫字東宫丹書緑名飛騎羽蓋四眞匡軿𢹂我同昇俱造玉清呪畢便咽氣三十過咽液二十四過止服紫書丹字行此道八年夫人授兆明月之璫丹字之道飛行玄虚上昇玉清右紫書丹字月魂隱音皆書月中北境青花之林結自然之書也皇上眞人諸天人皆以冬至之日採紫書丹字而服之得服此六字無量壽光暎兆之身與天人同年其法至重帝君所祕輕泄靈音身被風刀之考七祖充無極鬼責三塗五苦萬劫不原當以冬至之日正中北向墨書青紙上服之叩齒十二通微呪曰扶晨濯耀羅圎光蔚玉清玄暉冠綺合太漠鑒丹靈芬珠理幽覺紫字間花青皇上耀道支煙秀洞虚明灌我黃氣池漱我太陽精上拂景中林仰啜天人英空飛重玄上日月同根榮呪畢咽氣二十四過止又丹書生紫上佩頭有無量壽光暎兆之形得給玉女六人衛兆之形得給玉童六人衛兆之身也妄說靈音以告三人死没鬼官不得又仙百年之内有金名帝圖緑字紫清得傳一人祕尅神仙飛行太空也春分之日月宿金門之上金門之上則有通靈之門也以其時月於金精冶錬之池受錬於石景水母瑩飾於花光當此之日灌陽精於金門納黄氣於玉泉皇上眞人諸天人皆以其日採騫樹之花以拂日月之光月以黃氣灌天人之容故春分之日萬氣氤氲神景皆和黄氣陽精降接之時也求仙之道當以春分之日晡時入室西向眠坐任意閉眼内思月中青光夫人姓諱形長九寸頭作頺雲之髻著青錦飛裙口衘月光下入兆身兩目之上須㬰月光散爲黃氣流布一形夫人在月中央採騫林之花散拂黄氣之中口吐陽精陽精赤以灌兆形從内帀外黄赤二氣更相纒繞洞帀一身夫人以紫書丹字六音授於兆身便引黄氣二十四咽引陽精十六咽叩齒二十四通仰呪曰金冶八錬丹池浩淵玉膏滂沱流灑八騫黄氣鬱升陽精結煙採花蘭庭飛裙詵詵夫人嗽香皇上灌津柔景時融潤帀諸天丹暉八朗光明洞鮮迴曜曲暎下降我身得與月魂長保靈年乘空駕浮之造無間呪畢咽氣二十四過咽液十六過止便服紫書丹字行此道八年夫人授兆丹字眞音月中飛花以拂兆身面有金容飛行上清也右紫書丹字月魂隱音皆書月中西境騫樹之林結自然之書也皇上眞人諸天人皆以春分之日採紫書丹字而服之得服此六字則炎光暎兆之身月中玉佩七寳可得而明也其法至祕皇上書此音於皇上玉章之内故爲髙上之龍書也輕泄靈音七祖充責長役鬼官身没風刀萬不得仙當以春分之日晡時白書黄紙上服之叩齒十二通微呪曰太暉曜中天明霞煥金房玉字羅慶雲丹書結成藂飛歌散朱林窈窕太漠中靈音自然唱微辭八素宫諸天嗽金香流津灌我容靈同天人德皇上降紫童運我凌九虚上造朱月宫呪畢咽氣二十四過又丹書紫上佩頭則三年生自然紫光暎兆之形得使玉女六人妄說靈音以告三人死没鬼官七祖充責萬劫不原百年内有眞人聽一傳祕尅神仙飛行上清夏至之日月伏洞陽宫洞陽宫是日之上舘以其時月於流火之庭冶錬於八芒鮮明於月魂當此之日灌黃氣於洞陽納陽精於火宫八素眞人諸天人皆以其日採空青之林以拂日月之光月以陽精灌天人之容故夏至之日景氣激陽精降隂納靈二景接暉之時也求仙之道當以夏至之日夜半入室南向眠坐任意閉目内思月中丹光夫人姓諱形長八寸八分頭作頺雲之髻著丹錦飛裙口衘月光下入兆身心絳宫之中須㬰月光散爲黄氣帀降一形夫人在月中央採空青之花散拂黄氣之中口吐陽精陽精赤以灌兆形從内帀外黄赤二氣更相纏繞洞暎一身夫人以紫書丹字六音授於兆身便引黄氣二十四咽引陽精十二咽止叩齒二十四通仰呪曰流火萬頃洞陽之精陽安之舘三華玉城金仙内暎八素四明九曜降氣元上髙靈夫人嗽香散花玉清丹書紫字結音空青蘭池玉潤流灑八冥朱光翳普天仙鮮榮迴晨曲曜暎監我形得與朱月同死同生乘空駕虚參御飛軿玉女翼位金童輔靈翠羽輕蓋上造帝庭呪畢咽氣二十四過咽液十二過止便服紫書丹字行此道八年夫人授兆丹書眞文月中玉璫今兆飛昇上造洞陽之宫也右紫書丹字月魂隱音皆書月中南境空青之林結自然之書也八素眞人諸天人皆以夏至之日採紫書丹字而服之得服此六字與八素同年則項負圎明暎照十方其法至祕皇上八素眞人書此音於八素玉章之篇故爲髙上之妙經輕泄靈音七祖充責長没刀山身役風刀永不得仙當以夏至之日夜半朱書白紙上服之叩齒十二通微呪曰陽精丹池流火鬱飈金軒翼虚玄暉拂霄八素採蘭散香玉朝青林垂柳風振瓊條丹書紫文舍秀榮翹流芬灌津普潤無遼得與玄景齊光紫霄呪畢咽氣二十四過止又丹書紫上佩頭三年曰月玄暉暎兆之形月光夫人授兆眞書給玉女六人輕傳非眞七祖充責萬劫不原祕修八年則雲輿來降白日昇天飛行玉清也右月度周流四郷故與日有朔望之期日道陽月道隂雖同運而轉至於冠帶各居四節故日分一百八十日陽月分一百八十日隂數經三千六百度與日合則陽氣激隂氣否則太陽九數運周所加便天地攺宿萬癘蕩泄滅惡除凶學者不知天地之運則不免陽九之災也凡積學之夫鮮有坐致龍輿而髙登雲闕者也徒勞巖岫絶榖咽液服御日月而不知玄景之分廣狹城郭七寳朱林運宿四郷虧盈之期飛根不可得而掇皇華不可得而採陽精則不爲降隂精則不爲暎日月之道望之遠矣若能勤㝷其本知有運度之景城郭丘墟朱林淵池月中夫人姓字則日月感降亦無煩遠求艱難之要自然得乘雲輿飛輪上造日月之門也紫書丹字結於八素自然之氣髙玄羽章以生月中八騫之林字有紫光煥於月光之明八素眞人及諸天人悉採八騫之林紫書丹字而服之散香以拂日月之光也此音悉表大洞眞經故曰髙上之文得服此字面有金容項負圎明日月洞暎不學而仙也其法甚重髙上所祕不得輕泄依科七百年内若有金名東華紫字上清合眞之人聽得三傳自無此骨祕之玉關萬劫不宣也右八錬金治化仙眞符以立春之日黄書青紙投水中沐浴則通身錬化招日月之玄暉降眞人於玉庭并黄書青繒佩身八年與眞人交言降致雲輿飛昇金門之上受錬於金治之池也右八錬丹胎玉符以立夏之日正中丹書黄紙上投水中沐浴則内外錬化招飛根於陽精致黄氣於黄華迴日月以玄暎感眞人於玉字又丹書黄繒佩身八年眞人下降授兆眞文飛行空玄上昇洞陽之宫也右龍景九錬之符以立秋之日晡時青書白紙上投水中沐浴則骨髓錬變招玄暉於紫景致陽精於飛根納黄氣於水母降眞人於紫軒又青書白繒佩身八年頭有日圎之明飛行太空上昇廣靈之堂右日魂錬精隂符以立冬日夜半墨書青紙上投水中沐浴一身血精並被錬化致日精於紫景降飛花於八騫錬五府於玉池運兆身於廣寒又墨書青繒佩身八年身發金光項有圎明眞人下降授兆眞文飛行太空上昇廣寒之宫七星去地四十萬里圍七百二十里皆金精瑠璃爲其城郭七曜紫暉焰其光其内則諸天人衆眞之遊舘廣寒則其華蓋也其一晝一夜則運轉周天一度也亦如日月之輪其内亦生七寳朱林如是人定之後生氣之初七星受錬於廣寒之宫明鮮紫景於七曜之暉當此之時七曜煥落流精竟天紫景吐津以灌諸天於是衆眞帝仙皆以其時莫不採七曜之暉紫景之蘭也凡上學之士服日月之道當修七曜之妙法毎以人定之後當於别室燒香北首而卧安身定神棄絶異念專心在靈叩齒二十四通存思七星煥明北方己身卧於七星斗中華蓋之下七曜之光流煥紫景之外冠覆於己身己身在紫景之上七曜之中内外鬱冥都無所見良久豁除七曜之光化爲七童子各在一星之上第一童子諱樞明第二童子諱曜靈第三童子諱北元第四童子諱寳精第五童子諱丹嬰第六童子諱虚清第七童子諱紫瑛七童子吐七寳之光以哺飴兆身樞明童子吐紫景之光曜靈童子吐金精之光北元童子吐瑠璃之光寳精童子吐白銀之光丹嬰童子吐玉精之光虛清童子吐寳珠之光紫瑛童子吐珊瑚之光七寳之光同入兆身便引氣四十九咽微呪曰金精凝化結元七靈紫曜煥落朱景洞明華蓋徘徊輪轉寒庭寳光熠熠七曜嬰嬰玄暉吐蘭芳芝流盈夕寢靈舘朝登玉清璇璣運路紫景翼形宴轡雲輪䇿御飛軿遊盻八極三道合并呪畢咽液七過止起以粟米之粉粉身令帀而卧如此七年身生七寳之光頭有紫景華蓋恒冠兆形得使通靈玉童七人降致飛雲玄輿來迎兆身上昇北辰此道祕妙上眞所修不行下世若有刻簡玄名於未生之前記青録玉文之人當得此道得者克成上仙爲萬仙之師宗也輕泄失明刑殘七祖充責刀山食火三塗萬劫不原學士明愼四極之旨深寳之焉此七童子即七寳之内精化爲七曜之上眞知其名則不死修其法則神仙泄其諱則失明晨夕存念則恒衛兆身若有災厄困危之事叩齒七通呼七童子之名災即自消此道正可獨知而巳懷抱珠玉豈可放於垢塵也明愼祕之高上命四司五帝及諸天王遣監眞領仙恒履行五嶽及諸名山世間有三道之要黃氣陽精之法丹書紫字之文便列名於東華奏札於金闕以玉童玉女各七人侍衛有經者身若輕泄靈音替慢寳文爲玉童所奏罰以五帝神兵死没三塗五苦之中七祖充責萬劫不原修行三道之要當以月生三日十五日二十五日一月三朝日月之光夜半則朝七星之精再拜心念願昇三光之景服御靈暉之容如此七年則日月感降授子神眞之道也若有金名玉字列奏玄圖應得此文師當依盟對齋九十日或二十七日或三日弟子齎上金七兩黄紋四十尺青繒三十二尺告盟而傳無盟輕泄師被考没身弟子輕闚天眞失盟刑殘七祖獲罪三掠不原天文妙重紫書丹字甚祕故以盟信寳之不得輕傳學士被此之考明愼之也如是靈經生於太空之内書於玄圃之上積石之隂金堂玉室之裏靈文煥曜紫字鬱霄神童翼靈玉女散香各三千人侍衛神眞南極上元君受之於髙上投盟於太空以傳太微天帝君天帝君傳西龜王母王母傳金闕帝君帝君以付上相青童君使授後學得爲眞人者今封一通於西城山凡學仙不修此道徒勤感眞正可得下仙不死而巳望披天關登金闕永無由也既御三道修行八錬縱不得白日飛騰隱化之日自然即變上昇金門四郷之宫更受錬於玉池得給金翅之羽服上登金闕之宫故此法髙妙不與凡經齊倫有得其文不學自仙也中皇仙人玄子生墨翟子趙延甫寗康伯彭鑑安期帛髙之徒七百人㝷道履苦情貫玉虚雖騰身霄崖遊盤五嶽不得三道之要故不得上登金門之内受謁金闕之格今由飈身雲虚爲玉清䇿轡司迎上眞何異始學勤苦下世望登雲闕之遊乎如蘇子林谷希子㓜陽君王喬赤松皇人青眞之徒始學便修三道之要黃氣陽精丹書紫字之法便得超凌三清登青華之宫更受上品妙經詣金闕受號位登玉清上眞四極之任如此豈不異於有志乎王君以經傳南嶽夫人今封於陽浴宫南洞之室有志者勤㝷其文上清黄氣陽精三道順行經
