front:
  text: 上清黃氣陽精三道順行經一名藏月隱日妟十南極上元君曰吾受髙上順行三道之要黃氣陽精之道服御靈暉口啜皇花仰餐飛根存七矅於紫景行三道於金門洞闊狹於淵景明日月之方圎覩朱階於洞陽入錬陽於廣寒登七寶於玄圃攀飛梯於靈關回陽精於浮黎採黃氣於鬱單傍金翅於髙木回石景以映顔修御靈圖遂感神真乃三景垂映七精翼軒五靈交帶四司結篇西龜定録名題髙晨故位登南極上元之君此道髙妙非庸夫狹學所可言論今集其所稟粗説髙上玉帝口言以標玄虛自然靈文付上相青童君掌録玄宫經萬劫之後當授玄記白簡青録之人如是靈書紫文及八素真經紫霞內觀日暉中玄並各言其節事貴於服御而巳不能總其大原恢廓之渙也可謂攀其枝不測其根得其道不得其原也故學宜廣訪須上下相成修始習終道備氣充萬無不仙也日縱廣二千四十里金分水精暈於內流光照於外其中城郭人民七寶浴池生四種青紅黃白蓮花人長二丈四尺衣朱衣與四種花同衰同盛故有春秋冬夏四時行焉日行有五風一時風二徑風三助風四轉風五行風是故制御日月星宿遊行虛氣𥘉不休息皆風之梵其綱也日月運度虧盈者皆四時之會藏伏冠𢃄故也金門之上日行通明也金門之內有金精冶錬之池在西關耶尼之分故立春之日受錬魂於金門之內曜其光明於金門之外當此之時則光景柔鮮普天氣溫其年中一過如此經四十五日乃止其月月自復五過小錬八芒於金門之上八素經中巳具處其要順行至洞陽宫洞陽宫是日之上館一名離羅在浮黎之分以立夏之日於洞陽宫吐金冶之精以灌洞陽之宫更錬八芒於流火之庭當此之時則日光昏盛陽氣溢散普天大暑其年中一過如此經四十五日乃止順行至東井之上東井是月通暉之徑在于逯之分以立秋之日日於東井之中沐浴於景暈收八素之氣歸於廣寒之宫當此之時故天景髙澄普天氣涼其年中一過如此經四十五日乃止順行至廣寒宫廣寒宫是月宫之上館七星之華蓋在鬱單之界以立冬之日伏日精於廣寒之宫更冠帶胎養當此之時日景隂普天寒其年中一過如此經四十五日乃止一年日運周度冠帶四鄉合一百八十日是日所經之分餘一百八十日屬月之度二景離合隂陽虧盈各有分度之限也金門之內有髙騫之樹髙四千里枝超行二千里圍二百八十里根深八百四十里上有登天玉帝聞其勇猛勑鎮北方統攝真武之位以斷天下妖邪真人上白天尊曰如何得此神將入於下方收除魔鬼救度羣生免遭橫死日有所益伏願大慈天尊遂其所請乃勑右侍玉童馳詔真符一道徑往北方召其真武神將其神蒙召部領神衆徑到天尊前長跪臣巳奉玉帝勑命位鎮北方今日何緣得覩慈顔特蒙符召天尊告曰吾於上元宫中大會説法忽下方黑毒怨氣衝上天界大衆咸驚汝宜往彼收斷妖魔拔濟魂爽真武神將敬奉天尊教勑乃披髮跣足踏螣蛇八卦神龜部領三十萬神將六丁六甲五雷神兵巨虬獅子毒龍猛獸前後導從齊到下方七日之中天下妖魔一時收斷人鬼分離𡨚魂解散生人安泰國土清平真武神將與諸部衆還歸上元宫中朝見天尊曰昨奉教命往下方收斬妖魔仗慈尊力乃於七日之內天下邪鬼並皆清蕩天尊曰善哉汝等諸神得無勞手於是真武神將乃交乾布斗魁罡激指上佐天關而作呪曰
